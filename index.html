<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors!</title>
    <link rel="icon" type="jpg/png" href="./media/rps-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.cdnfonts.com/css/megamax-jonathan-too" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Rock, Paper, Scissors game!</h1>
    </header>
    <main>
        <section>
            <div id="roundResult">Choose your Weapon!<br>
            First to score 5 points wins the game!</div>
            <div class="choices">
                <div class="player-choice">❓</div>
                <div class="computer-choice">❓</div>
            </div>
            <div class="scores">
                <div class="playerScore"></div>
                <div class="computerScore"></div>
            </div>
        </section>
        <section class="btns">
            <button id="rock">💎</button>
            <button id="paper">📄</button>
            <button id="scissors">✂️</button>
        </section>
        <div id="finalResult"></div>
    </main>
    <footer>
        <h2>Developed by:</h2>
        <span><a href="https://github.com/aaronvalera" target="_blank"><img src="./media/github-icon.png" alt="github-logo">Aaron Valera 🤖</a></span>
    </footer>
    <div id="modal" class="hidden">
        <div class="result-card">
            <h2 id="modal-title"></h2>
            <p id="modal-final-score"></p>
            <button id="reset-btn">RETRY 🎮</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
